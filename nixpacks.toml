# Railway uses Nixpacks by default. WeasyPrint needs these native libraries
# (Pango, Cairo, GDK-Pixbuf, libffi) and a font package at runtime — the Python
# wheels alone are not enough. If a future Nixpacks/Debian base renames a
# package and the build fails, see the Dockerfile fallback in README.md.

[phases.setup]
aptPkgs = [
  "libpango-1.0-0",
  "libpangocairo-1.0-0",
  "libgdk-pixbuf-2.0-0",
  "libcairo2",
  "libffi-dev",
  "shared-mime-info",
  "fonts-liberation",
  "fonts-dejavu-core",
]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
